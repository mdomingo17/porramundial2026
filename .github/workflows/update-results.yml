name: Update World Cup results

on:
  schedule:
    - cron: "7,17,27,37,47,57 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-world-cup-results
  cancel-in-progress: false

jobs:
  update-results:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Update results from ESPN public scoreboard
        run: python -u scripts/update_espn_results.py

      - name: Commit updated results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/results.json

          if git diff --staged --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Update World Cup results"
          git pull --rebase
          git push
