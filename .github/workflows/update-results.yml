name: Update World Cup results

on:
  schedule:
    - cron: "3,8,13,18,23,28,33,38,43,48,53,58 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-world-cup-results
  cancel-in-progress: false

jobs:
  update-results:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Debug trigger
        run: |
          echo "event=${{ github.event_name }}"
          echo "schedule=${{ github.event.schedule }}"
          echo "ref=${{ github.ref }}"
          date -u

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Update results from ESPN public scoreboard
        run: python -u scripts/update_espn_results.py

      - name: Show changes
        run: |
          git status --short
          git diff -- data/results.json | sed -n '1,160p'

      - name: Commit updated results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/results.json

          if git diff --staged --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Update World Cup results"
          git pull --rebase
          git push
