name: Update World Cup results

on:
  workflow_dispatch:
    inputs:
      keep_alive:
        description: "Keep polling every 5 minutes"
        required: false
        default: "true"
  schedule:
    # Backup: starts/restarts the polling loop every 6 hours during June/July.
    # The real 5-minute cadence is done by workflow_dispatch self-dispatch below.
    - cron: "11 */6 * 6,7 *"

permissions:
  contents: write
  actions: write

concurrency:
  group: update-world-cup-results
  cancel-in-progress: true

jobs:
  update-results:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Update results from ESPN public scoreboard
        run: python -u scripts/update_espn_results.py

      - name: Commit updated results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/results.json

          if git diff --staged --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Update World Cup results"
          git pull --rebase
          git push

      - name: Stop after World Cup
        id: stop_check
        run: |
          TODAY="$(date -u +%Y-%m-%d)"
          if [[ "$TODAY" > "2026-07-20" ]]; then
            echo "stop=true" >> "$GITHUB_OUTPUT"
            echo "World Cup period finished. Not scheduling another poll."
          else
            echo "stop=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Wait 5 minutes before next poll
        if: steps.stop_check.outputs.stop == 'false'
        run: sleep 300

      - name: Trigger next poll
        if: steps.stop_check.outputs.stop == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          curl --fail-with-body -sS -L -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPO}/actions/workflows/update-results.yml/dispatches" \
            -d '{"ref":"main","inputs":{"keep_alive":"true"}}'

